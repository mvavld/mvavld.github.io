<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oggy Shop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: transparent;
        }
        .phone-frame {
            width: 420px;
            height: 910px;
            padding: 18px 10px 22px;
            background: #1c1c1e;
            border-radius: 48px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5), inset 0 0 0 3px #2c2c2e;
        }
        .phone-screen {
            width: 402px;
            height: 874px;
            border-radius: 42px;
            overflow: hidden;
            background: #000;
            display: flex;
            flex-direction: column;
        }
        .status-bar {
            height: 47px;
            min-height: 47px;
            background: #ffffff;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            color: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
            font-size: 15px;
            font-weight: 600;
        }
        .status-bar-icons {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .status-bar-icons svg {
            height: 13px;
            width: auto;
        }
        .app-content {
            flex: 1;
            min-height: 0;
        }
        .app-content iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .home-indicator {
            height: 35px;
            min-height: 35px;
            background: #ffffff;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .home-indicator::after {
            content: '';
            width: 134px;
            height: 5px;
            background: #000000;
            border-radius: 3px;
        }
    </style>
</head>

        </div>
    </div>
    <script>
        (function() {
            var app = document.getElementById('app');
            window.addEventListener('message', function(e) {
                if (e.source === app.contentWindow) {
                    window.parent.postMessage(e.data, '*');
                } else if (app.contentWindow) {
                    app.contentWindow.postMessage(e.data, '*');
                }
            });
        })();
    </script>
